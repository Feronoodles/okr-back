spring.application.name=okr
server.port=8080
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/okr_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Facil123}

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect
api.security.secret=${api_secret}

springdoc.swagger-ui.tagsSorter=alpha

spring.datasource.hikari.connection-timeout=2500
spring.datasource.hikari.maximum-pool-size=3

# Tama�o del lote (cu�ntos registros enviar por vez)
spring.jpa.properties.hibernate.jdbc.batch_size=100

# Ordena las inserciones para optimizar el lote
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true